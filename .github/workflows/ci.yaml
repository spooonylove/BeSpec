name: Rust CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # We test on all three major OSes to ensure cross-platform compatibility
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    # === COMBINED LINUX DEPENDENCIES ===
    # GUI deps (udev, wayland, xkb), media deps (dbus, pkg-config),
    # plus the native PipeWire audio capture backend's compile-time deps:
    #   - libpipewire-0.3-dev: libspa-sys / pipewire-sys link against this
    #   - libclang-dev:        bindgen (used by libspa-sys) needs libclang
    #                          to parse the pipewire C headers
    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libasound2-dev \
          libudev-dev \
          libwayland-dev \
          libxkbcommon-dev \
          libdbus-1-dev \
          libpipewire-0.3-dev \
          libclang-dev \
          pkg-config

    # Cache cargo registry and build artifacts to speed up future runs
    - name: Cache Cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --verbose